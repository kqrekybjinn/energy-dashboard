<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="能源管理终端" />
    <title>能源管理终端</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js"></script>
    <script type="module" src="./app.js"></script>
  </head>
  <body>
    <div id="app" class="app-shell">
      <main id="view" class="view" aria-live="polite"></main>

      <nav class="tabbar" aria-label="主导航">
        <button class="tab-button is-active" type="button" data-view="dashboard" title="仪表盘">
          <span class="tab-icon">▦</span>
          <span>仪表盘</span>
        </button>
        <button class="tab-button" type="button" data-view="data" title="光伏电池">
          <span class="tab-icon">≡</span>
          <span>光伏</span>
        </button>
        <button class="tab-button" type="button" data-view="settings" title="设置">
          <span class="tab-icon">⚙</span>
          <span>设置</span>
        </button>
      </nav>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>
  </body>
</html>
